<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="oklch(0.22 0.03 210)" />
      <stop offset="100%" stop-color="oklch(0.10 0.02 210)" />
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="oklch(0.60 0.11 78)" stop-opacity="0.15" />
      <stop offset="100%" stop-color="oklch(0.60 0.11 78)" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Decorative border lines -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="oklch(0.60 0.11 78)" stroke-width="1" stroke-opacity="0.4" />
  <rect x="52" y="52" width="1096" height="526" fill="none" stroke="oklch(0.60 0.11 78)" stroke-width="0.5" stroke-opacity="0.25" />

  <!-- Corner ornaments -->
  <g fill="none" stroke="oklch(0.60 0.11 78)" stroke-width="1" stroke-opacity="0.5">
    <path d="M40,80 L40,40 L80,40" />
    <path d="M1120,40 L1160,40 L1160,80" />
    <path d="M40,550 L40,590 L80,590" />
    <path d="M1120,590 L1160,590 L1160,550" />
  </g>

  <!-- Brand name -->
  <text x="600" y="280" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="400" letter-spacing="0.15em"
        fill="oklch(0.92 0.02 78)">HOUSE OF MORNII</text>

  <!-- Subtitle divider -->
  <line x1="440" y1="320" x2="760" y2="320" stroke="oklch(0.60 0.11 78)" stroke-width="0.75" stroke-opacity="0.7" />

  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="400" letter-spacing="0.25em"
        fill="oklch(0.70 0.06 78)">REGAL COSTUME JEWELRY</text>
</svg>
