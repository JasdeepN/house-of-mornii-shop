<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <linearGradient id="goldGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B5742;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#C9A961;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E7C3;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#A38B5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5742;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A961;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
    </linearGradient>

    <filter id="goldBevelEffect">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1.5" specularExponent="30" lighting-color="#F4E7C3" result="specOut">
        <fePointLight x="-5000" y="-10000" z="20000"/>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="784" height="584" rx="24" ry="24" fill="none" stroke="url(#goldGrad1)" stroke-width="4" filter="url(#goldBevelEffect)" />
  
  <rect x="16" y="16" width="768" height="568" rx="18" ry="18" fill="none" stroke="url(#goldGrad2)" stroke-width="2.5" opacity="0.7" />

  <g filter="url(#goldBevelEffect)">
    <path d="M 8 60 Q 8 30 24 18 Q 36 8 60 8" fill="none" stroke="url(#goldGrad1)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 16 70 Q 16 38 32 24 Q 46 16 75 16" fill="none" stroke="url(#goldGrad2)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    
    <path d="M 20 45 Q 28 32 40 26 Q 52 20 64 26 Q 76 32 84 45" fill="none" stroke="url(#goldGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M 45 20 Q 32 28 24 40 Q 18 52 24 64 Q 30 76 42 84" fill="none" stroke="url(#goldGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    
    <circle cx="44" cy="44" r="8" fill="url(#goldGrad1)" opacity="0.6" filter="url(#goldGlow)"/>
    <circle cx="36" cy="36" r="5" fill="#F4E7C3" opacity="0.85"/>
    <circle cx="30" cy="30" r="3" fill="#C9A961" opacity="0.65"/>
  </g>

  <g filter="url(#goldBevelEffect)" transform="translate(800, 0) scale(-1, 1)">
    <path d="M 8 60 Q 8 30 24 18 Q 36 8 60 8" fill="none" stroke="url(#goldGrad1)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 16 70 Q 16 38 32 24 Q 46 16 75 16" fill="none" stroke="url(#goldGrad2)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    
    <path d="M 20 45 Q 28 32 40 26 Q 52 20 64 26 Q 76 32 84 45" fill="none" stroke="url(#goldGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M 45 20 Q 32 28 24 40 Q 18 52 24 64 Q 30 76 42 84" fill="none" stroke="url(#goldGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    
    <circle cx="44" cy="44" r="8" fill="url(#goldGrad1)" opacity="0.6" filter="url(#goldGlow)"/>
    <circle cx="36" cy="36" r="5" fill="#F4E7C3" opacity="0.85"/>
    <circle cx="30" cy="30" r="3" fill="#C9A961" opacity="0.65"/>
  </g>

  <g filter="url(#goldBevelEffect)" transform="translate(0, 600) scale(1, -1)">
    <path d="M 8 90 Q 8 48 30 28 Q 50 12 90 12" fill="none" stroke="url(#goldGrad1)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 20 105 Q 20 58 44 36 Q 66 24 110 24" fill="none" stroke="url(#goldGrad2)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    
    <path d="M 28 65 Q 40 48 56 38 Q 72 28 88 34 Q 104 40 120 56 Q 136 72 148 92" fill="none" stroke="url(#goldGrad1)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M 65 28 Q 48 40 36 56 Q 26 72 30 88 Q 36 104 52 120 Q 68 136 88 148" fill="none" stroke="url(#goldGrad1)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
    
    <path d="M 44 56 Q 52 44 68 44 Q 84 44 92 56 Q 100 68 100 84" fill="none" stroke="url(#goldGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 56 44 Q 44 52 44 68 Q 44 84 56 92 Q 68 100 84 100" fill="none" stroke="url(#goldGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    
    <circle cx="68" cy="68" r="12" fill="url(#goldGrad1)" opacity="0.7" filter="url(#goldGlow)"/>
    <circle cx="58" cy="58" r="8" fill="#F4E7C3" opacity="0.9"/>
    <circle cx="50" cy="50" r="5" fill="#C9A961" opacity="0.7"/>
    <circle cx="44" cy="44" r="3" fill="#D4AF37" opacity="0.6"/>
  </g>

  <g filter="url(#goldBevelEffect)" transform="translate(800, 600) scale(-1, -1)">
    <path d="M 8 90 Q 8 48 30 28 Q 50 12 90 12" fill="none" stroke="url(#goldGrad1)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 20 105 Q 20 58 44 36 Q 66 24 110 24" fill="none" stroke="url(#goldGrad2)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    
    <path d="M 28 65 Q 40 48 56 38 Q 72 28 88 34 Q 104 40 120 56 Q 136 72 148 92" fill="none" stroke="url(#goldGrad1)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M 65 28 Q 48 40 36 56 Q 26 72 30 88 Q 36 104 52 120 Q 68 136 88 148" fill="none" stroke="url(#goldGrad1)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
    
    <path d="M 44 56 Q 52 44 68 44 Q 84 44 92 56 Q 100 68 100 84" fill="none" stroke="url(#goldGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 56 44 Q 44 52 44 68 Q 44 84 56 92 Q 68 100 84 100" fill="none" stroke="url(#goldGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    
    <circle cx="68" cy="68" r="12" fill="url(#goldGrad1)" opacity="0.7" filter="url(#goldGlow)"/>
    <circle cx="58" cy="58" r="8" fill="#F4E7C3" opacity="0.9"/>
    <circle cx="50" cy="50" r="5" fill="#C9A961" opacity="0.7"/>
    <circle cx="44" cy="44" r="3" fill="#D4AF37" opacity="0.6"/>
  </g>
</svg>
