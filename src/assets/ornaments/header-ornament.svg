<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .header-ornament {
        fill: none;
        stroke: oklch(0.60 0.11 78);
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .header-fill {
        fill: oklch(0.60 0.11 78);
      }
    </style>
  </defs>
  
  <g transform="translate(100, 30)">
    <!-- Center vertical line -->
    <line class="header-ornament" x1="0" y1="-25" x2="0" y2="-10" stroke-width="1" />
    <line class="header-ornament" x1="0" y1="10" x2="0" y2="25" stroke-width="1" />
    
    <!-- Top ornament -->
    <path
      class="header-ornament"
      d="M 0 -25 L -5 -28 M 0 -25 L 5 -28"
      stroke-width="0.75"
      opacity="0.8"
    />
    <path
      class="header-ornament"
      d="M -3 -22 L -8 -20 M 3 -22 L 8 -20"
      stroke-width="0.5"
      opacity="0.6"
    />
    
    <!-- Bottom ornament -->
    <path
      class="header-ornament"
      d="M 0 25 L -5 28 M 0 25 L 5 28"
      stroke-width="0.75"
      opacity="0.8"
    />
    <path
      class="header-ornament"
      d="M -3 22 L -8 20 M 3 22 L 8 20"
      stroke-width="0.5"
      opacity="0.6"
    />
    
    <!-- Center diamond -->
    <path
      class="header-ornament"
      d="M 0 -8 L 6 0 L 0 8 L -6 0 Z"
      stroke-width="1"
    />
    
    <!-- Inner circle -->
    <circle class="header-ornament" cx="0" cy="0" r="4" stroke-width="0.75" />
    <circle class="header-fill" cx="0" cy="0" r="1.5" opacity="0.8" />
    
    <!-- Side flourishes -->
    <path
      class="header-ornament"
      d="M -6 0 L -15 -5 M -6 0 L -15 5"
      stroke-width="0.75"
      opacity="0.7"
    />
    <path
      class="header-ornament"
      d="M 6 0 L 15 -5 M 6 0 L 15 5"
      stroke-width="0.75"
      opacity="0.7"
    />
    
    <!-- Decorative curves -->
    <path
      class="header-ornament"
      d="M -10 -8 Q -12 -6 -14 -8 M 10 -8 Q 12 -6 14 -8"
      stroke-width="0.5"
      opacity="0.6"
    />
    <path
      class="header-ornament"
      d="M -10 8 Q -12 6 -14 8 M 10 8 Q 12 6 14 8"
      stroke-width="0.5"
      opacity="0.6"
    />
    
    <!-- End dots -->
    <circle class="header-fill" cx="-18" cy="-5" r="1" opacity="0.6" />
    <circle class="header-fill" cx="-18" cy="5" r="1" opacity="0.6" />
    <circle class="header-fill" cx="18" cy="-5" r="1" opacity="0.6" />
    <circle class="header-fill" cx="18" cy="5" r="1" opacity="0.6" />
    
    <!-- Small accent diamonds -->
    <path
      class="header-ornament"
      d="M 0 -15 L 2 -13 L 0 -11 L -2 -13 Z"
      stroke-width="0.5"
      opacity="0.7"
    />
    <path
      class="header-ornament"
      d="M 0 15 L 2 13 L 0 11 L -2 13 Z"
      stroke-width="0.5"
      opacity="0.7"
    />
  </g>
</svg>
