name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: node node_modules/vitest/vitest.mjs run

      - name: Build
        run: npm run build
        env:
          VITE_SHOPIFY_STORE_DOMAIN: ${{ secrets.VITE_SHOPIFY_STORE_DOMAIN }}
          VITE_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.VITE_SHOPIFY_STOREFRONT_TOKEN }}
          VITE_SITE_NAME: ${{ vars.VITE_SITE_NAME || 'House of Mornii' }}
          VITE_SITE_TITLE: ${{ vars.VITE_SITE_TITLE || 'House of Mornii - Regal Costume Jewelry' }}
          VITE_SITE_DESCRIPTION: ${{ vars.VITE_SITE_DESCRIPTION || 'Regal costume jewellery embodying timeless luxury and modern artistry. Heritage-inspired pieces crafted to honor tradition while celebrating contemporary elegance.' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://houseofmornii.com' }}
          VITE_SITE_OG_IMAGE_PATH: ${{ vars.VITE_SITE_OG_IMAGE_PATH || '/og-image.png' }}
          VITE_SITE_OG_IMAGE_ALT: ${{ vars.VITE_SITE_OG_IMAGE_ALT || 'House of Mornii - Regal Costume Jewelry' }}
          VITE_THEME_COLOR: ${{ vars.VITE_THEME_COLOR || 'oklch(0.15 0.02 210)' }}
          VITE_CONTACT_EMAIL: ${{ vars.VITE_CONTACT_EMAIL }}
          VITE_INSTAGRAM_HANDLE: ${{ vars.VITE_INSTAGRAM_HANDLE || '@houseofmornii' }}
          VITE_INSTAGRAM_URL: ${{ vars.VITE_INSTAGRAM_URL || 'https://instagram.com/houseofmornii' }}
          VITE_CONTACT_LOCATION_LABEL: ${{ vars.VITE_CONTACT_LOCATION_LABEL || 'Appointment details coming soon' }}
          VITE_NEWSLETTER_ENDPOINT: ${{ vars.VITE_NEWSLETTER_ENDPOINT }}
          VITE_NEWSLETTER_EYEBROW: ${{ vars.VITE_NEWSLETTER_EYEBROW || 'Join the House of Mornii list' }}
          VITE_NEWSLETTER_PLACEHOLDER: ${{ vars.VITE_NEWSLETTER_PLACEHOLDER || 'your@email.com' }}
          VITE_NEWSLETTER_CTA: ${{ vars.VITE_NEWSLETTER_CTA || 'Join' }}
          VITE_NEWSLETTER_LOADING_LABEL: ${{ vars.VITE_NEWSLETTER_LOADING_LABEL || 'Joining...' }}
          VITE_NEWSLETTER_SUCCESS_MESSAGE: ${{ vars.VITE_NEWSLETTER_SUCCESS_MESSAGE || 'Thank you. We will share updates as the collection opens.' }}
          VITE_NEWSLETTER_ERROR_MESSAGE: ${{ vars.VITE_NEWSLETTER_ERROR_MESSAGE || 'We could not save your email yet. Please try again.' }}
          VITE_WELCOME_POPUP_EYEBROW: ${{ vars.VITE_WELCOME_POPUP_EYEBROW || 'Welcome' }}
          VITE_WELCOME_POPUP_TITLE: ${{ vars.VITE_WELCOME_POPUP_TITLE || 'House of Mornii' }}
          VITE_WELCOME_POPUP_DESCRIPTION: ${{ vars.VITE_WELCOME_POPUP_DESCRIPTION || 'Join the list for collection previews and launch updates.' }}
          VITE_GA4_MEASUREMENT_ID: ${{ secrets.VITE_GA4_MEASUREMENT_ID }}
          VITE_META_PIXEL_ID: ${{ secrets.VITE_META_PIXEL_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=house-of-mornii
