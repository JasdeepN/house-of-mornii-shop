name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [test]

jobs:
  # ── Shared test job (runs before any deploy) ───────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npx vitest run

  # ── Dev deployment ─────────────────────────────────────────────────────
  deploy-dev:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/test' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.houseofmornii.com
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (dev)
        run: npm run build
        env:
          NODE_ENV: production
          DEPLOY_ENV: dev
          VITE_SHOPIFY_STORE_DOMAIN: ${{ secrets.DEV_VITE_SHOPIFY_STORE_DOMAIN || secrets.VITE_SHOPIFY_STORE_DOMAIN }}
          VITE_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.DEV_VITE_SHOPIFY_STOREFRONT_TOKEN || secrets.VITE_SHOPIFY_STOREFRONT_TOKEN }}
          VITE_SITE_NAME: ${{ vars.DEV_VITE_SITE_NAME || vars.VITE_SITE_NAME || 'House of Mornii (Dev)' }}
          VITE_SITE_URL: ${{ vars.DEV_VITE_SITE_URL || 'https://dev.houseofmornii.com' }}

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=house-of-mornii-dev --branch=${{ github.ref_name }}

      - name: Output deployment URL
        run: |
          echo "## Dev Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** house-of-mornii-dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Custom domain:** https://dev.houseofmornii.com (configure alias in Cloudflare dashboard)" >> $GITHUB_STEP_SUMMARY

  # ── Prod deployment ────────────────────────────────────────────────────
  deploy-prod:
    needs: test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://houseofmornii.com
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (prod)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SHOPIFY_STORE_DOMAIN: ${{ secrets.VITE_SHOPIFY_STORE_DOMAIN }}
          VITE_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.VITE_SHOPIFY_STOREFRONT_TOKEN }}
          VITE_SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.VITE_SHOPIFY_ADMIN_ACCESS_TOKEN }}
          VITE_SITE_NAME: ${{ vars.VITE_SITE_NAME || 'House of Mornii' }}
          VITE_SITE_TITLE: ${{ vars.VITE_SITE_TITLE || 'House of Mornii - Regal Costume Jewelry' }}
          VITE_SITE_DESCRIPTION: ${{ vars.VITE_SITE_DESCRIPTION || 'Regal costume jewellery embodying timeless luxury and modern artistry.' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://houseofmornii.com' }}
          VITE_CONTACT_EMAIL: ${{ vars.VITE_CONTACT_EMAIL }}
          VITE_NEWSLETTER_ENDPOINT: ${{ vars.VITE_NEWSLETTER_ENDPOINT }}
          VITE_GA4_MEASUREMENT_ID: ${{ secrets.VITE_GA4_MEASUREMENT_ID }}
          VITE_META_PIXEL_ID: ${{ secrets.VITE_META_PIXEL_ID }}

      - name: Deploy to Cloudflare Pages (prod)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=house-of-mornii --branch=main

      - name: Output deployment URL
        run: |
          echo "## Prod Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** house-of-mornii" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://houseofmornii.com" >> $GITHUB_STEP_SUMMARY
