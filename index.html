<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_SITE_TITLE%</title>
    <meta name="description" content="%VITE_SITE_DESCRIPTION%" />
    <meta name="theme-color" content="%VITE_THEME_COLOR%" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <!-- Open Graph -->
    <meta property="og:title" content="%VITE_SITE_TITLE%" />
    <meta property="og:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:site_name" content="%VITE_SITE_NAME%" />
    <meta property="og:image" content="%VITE_SITE_URL%%VITE_SITE_OG_IMAGE_PATH%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="%VITE_SITE_OG_IMAGE_ALT%" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_SITE_TITLE%" />
    <meta name="twitter:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_SITE_URL%%VITE_SITE_OG_IMAGE_PATH%" />
    <meta name="twitter:image:alt" content="%VITE_SITE_OG_IMAGE_ALT%" />

    <!-- Fonts — Cinzel (headings) + Cormorant Garamond (body) + Inter (UI only) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Analytics (GA4 + Meta Pixel) are initialised in src/main.tsx.
         Set VITE_GA4_MEASUREMENT_ID and VITE_META_PIXEL_ID in .env.local or
         your Cloudflare Pages / CI environment variables to activate tracking. -->
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
